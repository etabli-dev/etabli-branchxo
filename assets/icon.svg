<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#0b1020"/>
  <!-- branching tree motif -->
  <g stroke="#7dd3fc" stroke-width="14" fill="none" stroke-linecap="round">
    <line x1="512" y1="820" x2="512" y2="540"/>
    <line x1="512" y1="540" x2="320" y2="380"/>
    <line x1="512" y1="540" x2="704" y2="380"/>
    <line x1="320" y1="380" x2="240" y2="240"/>
    <line x1="320" y1="380" x2="400" y2="240"/>
    <line x1="704" y1="380" x2="624" y2="240"/>
    <line x1="704" y1="380" x2="784" y2="240"/>
  </g>
  <g fill="#3b82f6">
    <circle cx="240" cy="240" r="32"/>
    <circle cx="624" cy="240" r="32"/>
  </g>
  <g fill="#f59e0b">
    <circle cx="400" cy="240" r="32"/>
    <circle cx="784" cy="240" r="32"/>
  </g>
  <circle cx="512" cy="820" r="40" fill="#a78bfa"/>
  <!-- X mark -->
  <g stroke="#3b82f6" stroke-width="38" stroke-linecap="round">
    <line x1="180" y1="700" x2="280" y2="800"/>
    <line x1="280" y1="700" x2="180" y2="800"/>
  </g>
  <!-- O mark -->
  <circle cx="794" cy="750" r="56" stroke="#f59e0b" stroke-width="32" fill="none"/>
</svg>
